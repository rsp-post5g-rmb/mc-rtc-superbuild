---
# Controller configuration for the CallmWbcController.
#
# MainRobot / Enabled are the keys mc_rtc reads to pick the main robot and the
# active controller. They are repeated here (as required by the task spec) but
# they only take effect from the global mc_rtc.yaml used to launch the framework,
# so make sure your run-time mc_rtc.yaml mirrors them:
#
#   MainRobot: UR5eFloatingBase
#   Enabled: CallmWbcController
#
MainRobot: UR5eFloatingBase
Enabled: CallmWbcController

# ---- Whole-body task gains -------------------------------------------------
# Arm end-effector task (UR5e "Tool" surface, robot 0).
ee_task:
  stiffness: 5.0
  weight: 1000.0

# Base command task (TriOrb "base" body, robot 1). Drives base_x / base_y /
# base_yaw to reach the commanded planar pose.
base_task:
  stiffness: 2.0
  weight: 1000.0

# UR5e posture task (robot 0) -- resolves arm redundancy in the EE null space.
ur5e_posture:
  stiffness: 10.0
  weight: 5.0

# NOTE on damping: task damping is seeded critical (2*sqrt(stiffness)) for every task.
# There is no per-task YAML damping knob -- shape damping at runtime, per task, via the
# WbcData `task_damping_ratio` field (zeta; damping = 2*zeta*sqrt(stiffness), zeta=1 =
# critical). mc_rtc has no generic "damping task" (mc_tasks::force::DampingTask is an
# admittance/force task needing a force sensor).

# How the base is driven: "velocity" (active -- from velocity_base) or "pose"
# (inactive/overridable -- from the Base target [world] GUI marker / BASE_TARGET_KEY).
base_command:
  mode: velocity

# TriOrb posture task (robot 1) -- light regularization of the base joints.
triorb_posture:
  stiffness: 1.0
  weight: 1.0

# Robotiq gripper posture task (robot 3) -- holds the knuckle joints of the model.
gripper_posture:
  stiffness: 1.0
  weight: 1.0

# ---- Robotiq gripper -------------------------------------------------------
# The gripper is a separate ConnectableRobotModule (mc_robot_tools) loaded as an
# extra robot and bolted onto the UR5e "Tool" surface in reset(). Commanding the
# physical gripper is done through the mc_robotiq GlobalPlugin datastore call
# `RobotiqGripper::setOpening` (0 = open, 1 = closed); enable that plugin in the
# global mc_rtc.yaml (see tests/etc/mc_rtc.yaml). If the module/plugin are absent
# the controller runs without the gripper.
gripper:
  enable: true
  model: Robotiq2f85Gripper        # or Robotiq2f140Gripper
  set_opening_call: "RobotiqGripper::setOpening"

# ---- ROS2 command client ---------------------------------------------------
# A WbcData message (std_msgs/Float64MultiArray, 20 doubles -- see WbcData.h) is
# received on command_topic and applied every loop; measured state is republished
# on measured_topic. The node spins on its own thread/context.
ros:
  node_name: callm_wbc_controller
  command_topic: "callm_wbc/command"
  measured_topic: "callm_wbc/measured"
  publish_measured: true
  publish_decimation: 10

# ---- Base state (SLAM) + base-velocity export ------------------------------
# The base is velocity-controlled hardware: its STATE is grounded every tick from
# a SLAM pose topic (geometry_msgs/PoseStamped), and the QP-realized base velocity
# is exported (body frame) to the TriorbBasePlugin via its `command_key`
# (Triorb::cmd_velocity). Set the plugin's `command_in_world_frame: false` to match.
#
#   slam_frame:
#     "capture_offset" -> grab the first SLAM pose at reset() as the map->world
#                         offset (robust; works whatever the SLAM map origin is).
#     "world"          -> use the SLAM pose raw (map == controller world; valid when
#                         SLAM zeroes its origin to the robot at each episode start).
# With no SLAM publisher / no TriorbBasePlugin (e.g. pure RViZ sim) both paths are
# inert and the base is driven by the in-QP velocity integration as before.
base_state:
  from_slam: true
  slam_topic: "/robot_pose_slam"
  slam_frame: world          # this rig zeroes SLAM origin per episode -> map == world
  slam_timeout: 0.5          # s; hold-last + warn once beyond this
  command_key: "Triorb::cmd_velocity"

# ---- Arm <-> base collision avoidance --------------------------------------
# Keeps the listed UR5e links clear of the TriOrb base box. The "base" convex is
# auto-generated by mc_rtc from the URDF <box> collision (an sch::S_Box), so no
# hull file is required. base_link / shoulder_link are deliberately not listed:
# the arm base is rigidly mounted on the base and would otherwise be in permanent
# collision. Add "upper_arm_link" if you want fuller coverage.
arm_base_collision:
  enable: true
  iDist: 0.05   # distance at which avoidance starts engaging (m)
  sDist: 0.02   # minimum allowed separation (m)
  arm_links: [forearm_link, wrist_1_link, wrist_2_link, wrist_3_link]
