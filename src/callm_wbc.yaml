MainRobot: UR5eFloatingBase
Enabled: CallmWbcController

# ---- Whole-body task gains -------------------------------------------------
# Arm end-effector task (UR5e "Tool" surface, robot 0).
ee_task:
  stiffness: 5.0
  weight: 1000.0

# Base command task (TriOrb "base" body, robot 1). Drives base_x / base_y /
# base_yaw to reach the commanded planar pose.
base_task:
  stiffness: 2.0
  weight: 1000.0

# UR5e posture task (robot 0) -- resolves arm redundancy in the EE null space.
ur5e_posture:
  stiffness: 10.0
  weight: 5.0

# TriOrb posture task (robot 1) -- light regularization of the base joints.
triorb_posture:
  stiffness: 1.0
  weight: 1.0

# ---- Arm <-> base collision avoidance --------------------------------------
# Keeps the listed UR5e links clear of the TriOrb base box. The "base" convex is
# auto-generated by mc_rtc from the URDF <box> collision (an sch::S_Box), so no
# hull file is required. base_link / shoulder_link are deliberately not listed:
# the arm base is rigidly mounted on the base and would otherwise be in permanent
# collision. Add "upper_arm_link" if you want fuller coverage.
arm_base_collision:
  enable: true
  iDist: 0.05   # distance at which avoidance starts engaging (m)
  sDist: 0.02   # minimum allowed separation (m)
  arm_links: [forearm_link, wrist_1_link, wrist_2_link, wrist_3_link]
